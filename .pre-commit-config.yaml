# Run with: `pre-commit run --all-files` (or install with `pre-commit install`).
# CI runs this via `.github/workflows/pre-commit.yaml` regardless of whether
# contributors have pre-commit installed locally. The existing `.hooks/pre-commit`
# handles staged-file formatting via lint-staged on every commit; this config
# adds wider hygiene checks (shellcheck, large-file detection, JSON/YAML
# validity, etc.) that aren't covered there.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^pnpm-lock\.yaml$
      - id: end-of-file-fixer
        exclude: ^pnpm-lock\.yaml$
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-case-conflict
      - id: check-symlinks
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # Enable one optional check beyond the defaults: require [[ ]] over
        # [ ] in bash/ksh.
        args: [-x, -P, .claude/hooks, -o, require-double-brackets]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-i, "2", -w]

  # Lints workflow/action correctness and runs shellcheck on inline `run:`
  # blocks that the standalone shellcheck hook can't see. Python-wrapped so it
  # needs no Go toolchain in the Python-only pre-commit CI job.
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Dogfood every tier through the same aggregates consumers enable, so a
      # check added to a tier immediately lints this repo too.
      - id: check-tier1
        name: "dogfood aggregate: every Tier 1 (honesty + identity) check"
        entry: python -m hooks.run_tier 1
        language: python
        additional_dependencies: [PyYAML, identify]
      - id: check-tier2
        name: "dogfood aggregate: every Tier 2 (opinionated) check"
        entry: python -m hooks.run_tier 2
        language: python
        additional_dependencies: [PyYAML, identify]
      - id: check-extras
        name: "dogfood aggregate: every Extras Python check"
        entry: python -m hooks.run_tier extras
        # check_global_stdio_swap is skipped, per its own docstring's scoping
        # advice: nothing here runs concurrently, and the checker's source plus
        # its test fixtures necessarily quote the banned idiom.
        args: [--skip, check_global_stdio_swap]
        # Excluded files quote the banned idioms by necessity: the prose-honesty
        # checks' test/fuzz fixtures embed un-annotated hits on purpose, the
        # README catalog must name each banned pattern to document its check,
        # and the inherited automation harness under .claude/ carries
        # deliberately illustrative `path/to/file.py:42` placeholders (it is
        # out of scope for this package's lint gate, as in ruff's config).
        exclude: |
          (?x)^(
            README\.md
            |\.claude/.*
            |tests/cts/test_check_(drift_guards|graceful_handwave|historical_comments|doc_line_refs)\.py
            |tests/cts/test_fuzz_prose_checks\.py
          )$
        language: python
        additional_dependencies:
          [PyYAML, identify, tree-sitter, tree-sitter-bash]

      - id: zizmor
        name: zizmor (GitHub Actions security audit)
        entry: zizmor
        language: python
        additional_dependencies: ["zizmor==1.25.2"]
        pass_filenames: false
        args: [".github/"]
        files: ^\.github/

      - id: validate-config
        name: validate Claude hook configuration
        entry: bash .github/scripts/validate-config.sh
        language: system
        pass_filenames: false
        files: ^(\.claude/|\.hooks/|\.github/workflows/)

      - id: lint-skills
        name: lint Claude SKILL.md files
        entry: bash .hooks/lint-skills.sh
        language: system
        files: ^\.claude/skills/.*\.md$

      - id: validate-changelog-fragments
        name: validate changelog.d fragment names
        entry: "bash -c 'node scripts/assemble-changelog.mjs --check'"
        language: system
        pass_filenames: false
        files: ^changelog\.d/
