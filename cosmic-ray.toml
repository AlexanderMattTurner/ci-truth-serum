# cosmic-ray mutation-testing config for the ci-truth-serum lint parsers.
#
# Why cosmic-ray (not mutmut): the test harness loads each hook by FILE PATH
# (tests/_helpers.load_hook -> importlib.spec_from_file_location), not via
# `import ci_truth_serum.x`. mutmut 3.x instruments through an import trampoline that
# file-path loading bypasses, so its mutants are never reached. cosmic-ray
# rewrites the file on disk and reruns the suite, so it is agnostic to how tests
# import the code under test.
#
# Scope: the whole `ci_truth_serum/` package is mutated. The orchestrators/IO-only modules
# (run_tier, sync_required_checks, the __main__/network plumbing) have no offline
# test oracle, so their mutants survive by design and are excluded below.
#
# This file is the SSOT (mutated package, exclusions, timeout, test-command,
# operator filters). CI does NOT run it whole: .github/scripts/mutation_shards.py
# derives one shard per remaining module from it and runs each in parallel, with
# the per-mutant oracle scoped to that module's own example suite, so the slow
# serial pass becomes a ~few-minute fan-out (see .github/workflows/mutation.yaml).
# The whole-package flow below is still the way to run it locally by hand:
#
#   uv run --extra mutation cosmic-ray init     cosmic-ray.toml cr-session.sqlite
#   uv run --extra mutation cosmic-ray baseline cosmic-ray.toml
#   uv run --extra mutation cosmic-ray exec     cosmic-ray.toml cr-session.sqlite
#   uv run --extra mutation cr-report                            cr-session.sqlite

[cosmic-ray]
module-path = "ci_truth_serum"
# Skip the two modules with no offline test oracle, so their always-surviving
# mutants don't drown the real survivors in the report:
#   - sync_required_checks: GitHub REST plumbing (network),
#   - run_tier: argv dispatcher to the other hooks (each mutated on its own).
# Everything else IS mutated, including check_pinned_base_images: its offline
# violations()/fix_text()/_split_ref paths are pinned by the example + fuzz
# suites, so they belong in the score (only its live registry resolver lacks an
# offline oracle, and those few survivors are expected).
excluded-modules = [
    "ci_truth_serum/sync_required_checks.py",
    "ci_truth_serum/run_tier.py",
    "ci_truth_serum/__init__.py",
]
timeout = 60.0
# The offline test suite is the oracle. -p no:cacheprovider keeps each worker
# from racing on the pytest cache; HYPOTHESIS_PROFILE is set in the env by the
# runner so the property suites use a fast-but-still-meaningful budget.
test-command = "python -m pytest -x -q -p no:cacheprovider tests/cts"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
# Operators whose mutants are predominantly equivalent/noise on this codebase.
exclude-operators = []
