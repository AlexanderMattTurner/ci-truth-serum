name: Dependabot Auto-Merge

# Automatically merges Dependabot PRs for minor/patch updates after CI passes.
# Major version updates require manual review.

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# `gh pr merge --auto` only enables auto-merge (GitHub performs the merge later
# once checks pass), and `gh pr comment` posts a note — both need just
# pull-requests: write, so contents stays read-only. NOTE: on Dependabot-authored
# PRs the GITHUB_TOKEN is read-only by default; for these steps to work the repo
# must grant Dependabot elevated permissions
# (Settings -> Code security -> Dependabot -> "Allow GitHub Actions to create and
# approve pull requests", plus enabling auto-merge on the repository).
permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "This is a **major version update** and requires manual review before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
