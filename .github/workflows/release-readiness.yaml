name: Release readiness check

# Has the default branch accumulated enough user-facing change since the last
# release to merit cutting a new vX.Y.Z release? Claude weighs the pending
# changelog.d/ fragments (security fixes, features, fix volume, cadence) and
# writes a verdict to the job summary. When a release IS warranted it opens a
# `release`-labelled PR: bumps package.json and rolls the CHANGELOG on a fresh
# `auto-release/vX.Y.Z` branch, then opens a pull request for it. It never pushes
# to the default branch and needs no ruleset-bypass credential — the release lands
# only when a human merges the PR, and tag-release.yaml then cuts the tag on that
# merge. release-prep.yaml is the parallel HUMAN path (a maintainer labels a
# hand-made PR); the shared `release` label makes an already-open release PR (human
# or auto) stand this path down so the two never collide.

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

concurrency:
  group: release-readiness
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether HEAD merits a release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # push the auto-release/vX.Y.Z branch (never the default branch)
      pull-requests: write # open the release PR + the concurrent-release probe (gh pr list)
      issues: write # open/close the release-failure tracking issue (see the final steps)
    steps:
      - name: Checkout
        # Ordinary GITHUB_TOKEN checkout: this workflow only pushes a NEW branch and
        # opens a PR — it never pushes to the default branch, so it needs no PAT and
        # no ruleset bypass. Credentials stay persisted so cut_release's branch push
        # authenticates.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          # Full history so the release branch shares a merge-base with the default
          # branch and the PR shows only the release commit.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Assess release readiness with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        # tee the combined output so the failure step can quote the real reason in
        # the tracking issue. pipefail keeps the script's exit code across the tee.
        run: |
          set -o pipefail
          bash .github/scripts/release-readiness.sh 2>&1 | tee "$RUNNER_TEMP/release-readiness.log"

      # Keep a single tracking issue in sync with the run's health: open (or
      # comment on) one when the run failed — a broken release pipeline that only
      # shows as a red scheduled run went unnoticed for days — and close it on the
      # next success. Both are best-effort notification, so neither is allowed to
      # change the job's real conclusion.
      - name: Open a tracking issue if the release run failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_LOG: ${{ runner.temp }}/release-readiness.log
        run: bash .github/scripts/manage-release-failure-issue.sh open

      - name: Resolve the tracking issue on a healthy run
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/manage-release-failure-issue.sh resolve
