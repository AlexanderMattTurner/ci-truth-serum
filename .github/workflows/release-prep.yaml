name: Release prep (pre-merge version bump)

# When a PR is labeled `release`, classify the pending changelog.d/ fragments as
# a conservative semver bump (patch or minor — never major) and commit the
# package.json bump + assembled CHANGELOG roll onto the PR branch. The bump then merges
# as part of the PR, so main's latest commit stays the real merge/squash commit.
# The matching vX.Y.Z tag is created post-merge by tag-release.yaml.

on:
  # not-required-check: advisory label-gated release automation, never a required
  # status check — the branches: [main, master] scoping is deliberate.
  pull_request: # not-required-check
    types: [labeled]
    branches: [main, master]

concurrency:
  group: release-prep-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    name: Conservative version bump on the PR branch
    if: github.event.label.name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        # Credentials stay persisted: release-prep.sh pushes the bump commit with them.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2 # zizmor: ignore[artipacked]
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # An org PAT lets the bump commit land on the PR branch (and clears
          # branch protection) from an account with write access to this repo —
          # a personal PAT for a different account pushes as its owner and 403s.
          # Falls back to GITHUB_TOKEN when the org PAT is unset.
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN_ORG || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Bump version on the PR branch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        # This job holds secrets and write access, so it must not execute
        # PR-controlled code: run the base branch's trusted copies of the release
        # script AND the changelog assembler it shells out to, not the PR's. Fall
        # back to a PR copy only to bootstrap the very PR that first adds each
        # (base has no copy yet).
        # trusted-base-ok: privileged job runs only the base branch's trusted
        # script copies, never the PR-controlled checkout.
        run: bash .github/scripts/release-prep-bump-version.sh
