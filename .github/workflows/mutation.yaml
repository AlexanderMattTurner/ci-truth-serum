name: Mutation testing

# Mutation testing over the lint parsers (cosmic-ray, Python) and the changelog
# assembler (Stryker, JS). cosmic-ray reruns the offline suite once per mutant,
# so the Python side is SLICED: one shard per mutated hook module, fanned across
# runners, each mutant scoped to its module's own example suite (see
# .github/scripts/mutation_shards.py). Slices run in parallel so wall-clock is
# the slowest single module, not the serial sum, and an aggregate step demands
# one report per shard so a vanished slice can't score a subset as the whole.
# Both sides are change-gated via decide-reusable: on a PR they run only when
# files they depend on changed; a weekly schedule re-checks main.
#
# Gate semantics: a shard fails only when its unmutated baseline is red or
# cosmic-ray errors — a surviving mutant is a prompt to add a test, not a build
# break — so "required" here means every shard ran cleanly and reported, not that
# the score is perfect. The mutation-passed reporter is an `if: always()` summary
# so it always concludes (even when the gates are closed), which lets it be a
# stable required status check. Concurrency is keyed per PR/ref so a superseded
# run goes red rather than stranding the required check.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
  workflow_dispatch:
    inputs:
      hypothesis_profile:
        description: Hypothesis profile for the property suites (dev = fast).
        type: string
        default: dev

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path gates: each runs unconditionally so the mutation-passed reporter always
  # receives a conclusion, then opens only when files the matching side depends
  # on change on a PR (always open on non-pull_request events).
  decide-py:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - 'hooks/**'
          - 'tests/**'
          - 'cosmic-ray.toml'
          - 'pyproject.toml'
          - '.python-version'
          - '.github/scripts/run-mutation.sh'
          - '.github/scripts/run-mutation-shard.sh'
          - '.github/scripts/mutation_shards.py'
          - '.github/scripts/aggregate-mutation.py'
          - '.github/workflows/mutation.yaml'
          - '.github/workflows/decide-reusable.yaml'

  decide-js:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - 'scripts/assemble-changelog.mjs'
          - 'scripts/assemble-changelog.test.mjs'
          - 'stryker.config.json'
          - 'package.json'
          - 'pnpm-lock.yaml'
          - '.github/actions/setup-base-env/**'
          - '.github/workflows/mutation.yaml'
          - '.github/workflows/decide-reusable.yaml'

  # Expand the shard matrix from the committed tree (one shard per mutated hook
  # module). The aggregate job re-derives the same set from the same checkout, so
  # their shard counts are guaranteed identical — the gate can never score a subset.
  plan:
    needs: decide-py
    if: needs.decide-py.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.shards.outputs.shards }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Compute shard matrix
        id: shards
        run: echo "shards=$(python3 .github/scripts/mutation_shards.py)" >> "$GITHUB_OUTPUT"

  # One shard per mutated module, in parallel. Each runs cosmic-ray over its one
  # module with the per-mutant oracle scoped to that module's example suite, and
  # uploads reports/mutation/<id>.json. Break-disabled by design: a survivor is
  # diagnostic, so a shard fails only on a red baseline or a cosmic-ray error.
  mutation:
    needs: plan
    if: needs.plan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # Pin uv exactly: an exact version skips setup-uv's raw.githubusercontent
          # version-manifest fetch (an un-retried single point of failure), so a
          # transient GitHub-CDN blip can't fail the job before any work runs.
          version: "0.11.31"
          # Keep in sync with .python-version / ci.yaml.
          python-version: "3.11"

      - name: Run mutation shard
        env:
          SHARD_ID: ${{ matrix.shard.id }}
          SHARD_INDEX: ${{ matrix.shard.index }}
          SHARD_TOTAL: ${{ matrix.shard.total }}
          HYPOTHESIS_PROFILE: ${{ inputs.hypothesis_profile || 'dev' }}
        run: uv run --extra mutation bash .github/scripts/run-mutation-shard.sh

      - name: Upload shard report
        if: ${{ always() && hashFiles(format('reports/mutation/{0}.json', matrix.shard.id)) != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-${{ matrix.shard.id }}
          path: reports/mutation/${{ matrix.shard.id }}.json
          if-no-files-found: error
          retention-days: 14

  # Demand exactly one report per shard (from the same expander the matrix used)
  # and print the per-shard survival rates. This is the coverage gate; the shards
  # themselves never fail on survivors.
  aggregate: # required-check: false  # rolled up by mutation-passed (which needs: aggregate)
    needs: [decide-py, plan, mutation]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Skip when shards did not run
        if: needs.decide-py.outputs.run != 'true'
        run: echo "::notice::No mutation-relevant Python files changed, nothing to aggregate"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.decide-py.outputs.run == 'true'
        with:
          persist-credentials: false

      - name: Download shard reports
        if: needs.decide-py.outputs.run == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutation-report-*
          path: shard-reports

      # aggregate-mutation.py is stdlib-only (json + tomllib); ubuntu-latest ships
      # Python 3.12, so no toolchain setup is needed to enforce the coverage gate.
      - name: Aggregate and enforce one report per shard
        if: needs.decide-py.outputs.run == 'true'
        run: python3 .github/scripts/aggregate-mutation.py shard-reports

  # JS counterpart: Stryker over the self-contained scripts/assemble-changelog.mjs.
  mutation-js:
    needs: decide-js
    if: needs.decide-js.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run Stryker
        run: pnpm mutation

  # Stable Required check: runs even when the gates close or a job is
  # cancelled/skipped, so a protected branch never gets stuck on a check that
  # never reports.
  mutation-passed: # required-check: true
    if: always()
    needs: [decide-py, decide-js, plan, mutation, aggregate, mutation-js]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
