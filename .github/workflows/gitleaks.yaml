name: Gitleaks Secret Scanning

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks: # required-check: false  # the always() gitleaks-passed reporter is the required check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download pinned gitleaks
        run: bash .github/scripts/install-gitleaks.sh

      - name: Run gitleaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/gitleaks-scan.sh

  # Stable Required check: runs even when `gitleaks` is cancelled, so a protected
  # branch never gets stuck on a check that never reports.
  gitleaks-passed: # required-check: true
    if: always()
    needs: [gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if gitleaks did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
